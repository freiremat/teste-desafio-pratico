<div class="w-3/4 mx-auto">
  <p class="text-lg text-gray-500 mb-2">Usuários cadastrados</p>

  <div class="overflow-x-auto rounded shadow-sm mt-10">
    <table mat-table [dataSource]="filteredUsers()" class="w-full">

      <ng-container matColumnDef="icon">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <mat-icon class="text-gray-400">person</mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button matTooltip="Editar usuário" matTooltipPosition="left">
            <mat-icon class="text-gray-400">edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['icon', 'name', 'email', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['icon', 'name', 'email', 'actions']"></tr>

    </table>
  </div>
</div>
